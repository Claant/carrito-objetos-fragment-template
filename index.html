<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jugando con DOM</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  </head>

  <body>
    
    <main class="container mt-5">
      <!--row para trabajar con el sistema de columnas y centrado (clase de boostrap)-->
<div class="row text-center">


<!--Para que en dispositivos pequeños no se peguen las tarjetas arriba y abajo (Adaptacion a dispositivos moviles RESPONSIVE)-->
<article class="col-sm-4 mb-3">
  <!--clase de card-body de boostrap -->
  <div class="card">
  <div class="card-body">
<h5 class="card-title" >Frutilla 🍓</h5>
<!-- Se debe agregar un atributo a cada boton para poder leerlo con javascript, lo que se hace con data.
 Luego en el archivo practicaTemplate.js con el metodo dataset se captura ese valor. -->
<button class="btn btn-outline-primary" data-fruta="Frutilla">Agregar</button>
  </div>
    </div>
</article>

<article class="col-sm-4 mb-3">
  <div class="card">
  <div class="card-body">
<h5 class="card-title">Banana 🍌</h5>
<button class="btn btn-outline-primary"  data-fruta="Banana">Agregar</button>
  </div>
  </div>
</article>

<article class="col-sm-4 mb-3">
  <div = class="card">  
  <div class="card-body">
<h5 class="card-title">Manzana 🍎</h5>
<button class="btn btn-outline-primary"  data-fruta="Manzana">Agregar</button>
  </div>
  </div>
</article>


</div>

    </main>

<section class="container mt-3">
<ul class="list-group" id="carrito"></ul>
</section>

<template id="template">
  <!-- el LI es el elemento que se repite-->
<li class="list-group-item d-flex justify-content-between align-items-center">
<span class="lead">Frutilla</span>
<span class="badge bg-primary rounded-pill">12</span>
</li>

</template>


    <script src="practicaTemplate.js"></script>
  </body>
</html>
